<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leilão Veículos</title>

<style>
html { scroll-behavior: smooth; font-family: Arial; }
body { margin: 0; }
header { background: #111; color: #fff; padding: 15px; }
nav a { color: #fff; margin: 0 10px; text-decoration: none; }
button { padding: 10px; cursor: pointer; }

section { padding: 60px 20px; }

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: #fff;
  padding: 20px;
  margin: 10% auto;
  width: 300px;
}

.close { cursor: pointer; float: right; }
</style>

</head>

<body>

<header>
<nav>
<a href="#home">Início</a>
<a href="#auctions">Leilões</a>
<a href="#how-it-works">Como Funciona</a>
<a href="#about">Sobre</a>
<a href="#contact">Contato</a>

<button id="loginBtn">Entrar</button>
<button id="registerBtn">Cadastrar</button>
</nav>
</header>

<main>

<section id="home">
<h1>Encontre seu veículo</h1>
<button onclick="showAuctions()">Ver Leilões</button>
</section>

<section id="auctions">
<h2>Leilões</h2>
</section>

<section id="how-it-works">
<h2>Como Funciona</h2>
</section>

<section id="about">
<h2>Sobre</h2>
</section>

<section id="contact">
<h2>Contato</h2>

<form id="contactForm">
<input type="text" placeholder="Nome" required><br><br>
<input type="email" placeholder="Email" required><br><br>
<textarea placeholder="Mensagem" required></textarea><br><br>
<button type="button">Entrar</button>
</form>

</section>

</main>

<!-- MODAL -->
<div id="authModal" class="modal">
<div class="modal-content">

<span class="close">X</span>

<div id="loginForm">
<h2>Entrar</h2>
<input type="email" placeholder="Email"><br><br>
<input type="password" placeholder="Senha"><br><br>
<button>Entrar</button>
<p><a href="#" id="showRegister">Cadastrar</a></p>
</div>

<div id="registerForm" style="display:none;">
<h2>Cadastrar</h2>
<input type="text" placeholder="Nome"><br><br>
<input type="email" placeholder="Email"><br><br>
<input type="password" placeholder="Senha"><br><br>
<button>Cadastrar</button>
<p><a href="#" id="showLogin">Entrar</a></p>
</div>

</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const registerBtn = document.getElementById("registerBtn");

const modal = document.getElementById("authModal");
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

document.querySelector(".close").onclick = () => modal.style.display = "none";

loginBtn.onclick = () => {
modal.style.display = "block";
loginForm.style.display = "block";
registerForm.style.display = "none";
};

registerBtn.onclick = () => {
modal.style.display = "block";
loginForm.style.display = "none";
registerForm.style.display = "block";
};

document.getElementById("showRegister").onclick = (e) => {
e.preventDefault();
loginForm.style.display = "none";
registerForm.style.display = "block";
};

document.getElementById("showLogin").onclick = (e) => {
e.preventDefault();
loginForm.style.display = "block";
registerForm.style.display = "none";
};

window.showAuctions = () => {
document.getElementById("auctions").scrollIntoView({ behavior: "smooth" });
};

document.getElementById("contactForm").addEventListener("submit", (e) => {
e.preventDefault();
alert("Mensagem enviada!");
});

});

</script>

</body>
</html>
