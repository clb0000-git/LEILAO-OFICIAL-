<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVS - Leilão Veículos Silva | Carros e Motos até 60% OFF</title>
    <meta name="description" content="LVS Leilão Veículos Silva - Carros, motos e caminhonetes com descontos de até 60%! Leilões semanais. Fale agora pelo WhatsApp!">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff6b35;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        .logo i {
            font-size: 2.2rem;
            color: #ff6b35;
            animation: pulseCar 2s infinite;
        }

        @keyframes pulseCar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a:hover {
            color: #ff6b35;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .header-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {

            transition: 0.3s;
        }

            text-align: center;

            overflow: hidden;

            z-index: 2;
            animation: slideUp 1s ease-out;

        @keyframes slideUp {

            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: clamp(3rem, 7vw, 5rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            text-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }

        .hero .subtitle {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 300;
            margin-bottom: 2.5rem;
            opacity: 0.95;
        }

        .discount-badge {
            display: inline-block;

            margin-bottom: 2.5rem;

        }

        @keyframes pulseGreen {

            50% { box-shadow: 0 20px 50px rgba(37, 211, 102, 0.6); }
            100% { box-shadow: 0 20px 50px rgba(37, 211, 102, 0.4); }

        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 3rem;
            position: relative;
            z-index: 2;
        }

        .stat-item h3 {
            font-size: clamp(2.5rem, 5vw, 4rem);

            margin-bottom: 1rem;
            text-shadow: 0 3px 15px rgba(0,0,0,0.3);

            opacity: 0.95;
        }

        .section-subtitle {

        .vehicle-cta {

            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;

            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .vehicle-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.4);
        }

        /* Services Section */
        .services {
            padding: 120px 0;
            background: white;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));

            text-align: center;
            transition: all 0.4s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff6b35, #f7931e, #ff6b35);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            border-color: #ff6b35;
        }

        .service-icon {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);

        }

        .service-card h3 {

        .whatsapp-widget {

        @keyframes bounceWidget {

            50% { transform: translateY(-20px); }
        }

        .whatsapp-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);

            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(37, 211, 102, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 5px solid rgba(255,255,255,0.2);
        }

        .whatsapp-btn:hover {
            transform: scale(1.2) rotate(15deg);
            box-shadow: 0 30px 70px rgba(37, 211, 102, 0.7);
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 5rem 0 2rem;
        }

        .footer-content {
            display: grid;

        .footer-section h3 {

            color: #ff6b35;
            font-size: 1.5rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ccc;
            transition: color 0.3s ease;
            font-size: 1.1rem;
        }

        .contact-item:hover {
            color: #ff6b35;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-links a {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: #ff6b35;
            transform: translateY(-3px);
        }

        .footer-bottom {
            border-top: 1px solid #333;
            padding-top: 2rem;
            text-align: center;
            color: #999;
        }
